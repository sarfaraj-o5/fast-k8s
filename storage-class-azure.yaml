# storage class on azure
apiVersion: storage.k8s.io/v1
kind: StorageClass 
metadata: 
  name: standarddisk
parameters:
  cachingmode: ReadOnly
  kind: Managed
  storageaccounttype: StandardSSD_LRS
provisioner: kubernetes.io/azure-disk
reclaimPolicy: Delete 
volumeBindingMode: WaitForFirstConsumer
---
## storage class name is added in pvc file
apiVersion: v1 
kind: PersistentVolumeClaim
metadata: 
  name: mysqlclaim
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources: 
    requests:
      storage: 5Gi 
  storageClassName: "standarddisk"      # select/binds to storage class(defined above)