apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: 
  name: secret-reader
rules:
- apiGroup: [""]
  resources: ["secrets"]
  verbs: ["get", "watch", "list"]
---
## ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: 
  name: read-secrets-global
subjects:
- kind: Group 
  name: DevTeam # name is case sensitive
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io